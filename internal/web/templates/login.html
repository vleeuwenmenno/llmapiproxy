<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM API Proxy — Login</title>
    <link rel="stylesheet" href="/ui/static/main.css">
    <link rel="stylesheet" href="/ui/static/login.css">
</head>
<body>
    <div class="noise"></div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">&#9728;</button>

    <div class="login-card">
        <div class="logo">
            <div class="icon">&#9889;</div>
            <span>LLM API Proxy</span>
        </div>
        <p class="subtitle">Sign in to access the dashboard</p>

        {{if .Error}}
        <div class="msg error">{{.Error}}</div>
        {{end}}

        <form method="POST" action="/ui/login">
            <input type="hidden" name="next" value="{{.Next}}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
    </div>

    <script>
    (function() {
        const saved = localStorage.getItem('theme') || 'dark';
        applyTheme(saved);
    })();

    function applyTheme(theme) {
        if (theme === 'system') {
            document.body.classList.toggle('light', !window.matchMedia('(prefers-color-scheme: dark)').matches);
        } else {
            document.body.classList.toggle('light', theme === 'light');
        }
        document.getElementById('themeBtn').textContent = document.body.classList.contains('light') ? '\uD83C\uDF19' : '\u2600';
    }

    function toggleTheme() {
        var current = localStorage.getItem('theme') || 'dark';
        var next = current === 'light' ? 'dark' : 'light';
        localStorage.setItem('theme', next);
        applyTheme(next);
    }
    </script>
</body>
</html>
