<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM API Proxy — Config</title>
    <script src="/ui/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/ui/static/main.css">
    <link rel="stylesheet" href="/ui/static/config.css">
</head>
<body>
    <div class="noise"></div>
    {{template "navbar" .}}
    <main>
        <h1>Configuration</h1>

        {{if .Message}}
        <div class="message {{if eq (printf "%.5s" .Message) "Error"}}error{{else}}success{{end}}">
            {{.Message}}
        </div>
        {{end}}

        <form method="POST" action="/ui/config/save">
            <div class="editor-wrap">
                <div class="editor-header">
                    <span class="filename">config.yaml</span>
                </div>
                <textarea name="config" spellcheck="false" placeholder="# YAML configuration...">{{.Config}}</textarea>
                <div class="actions">
                    <button type="button" class="secondary" onclick="window.location.reload()">Reset</button>
                    <button type="submit" class="primary">Save &amp; Reload</button>
                </div>
            </div>
        </form>

        <div class="hint">
            Changes are validated before saving. The proxy will reload backends automatically.
            Configuration is stored at the path specified by <code>-config</code> flag.
        </div>
    </main>
</body>
<script src="/ui/static/shared.js"></script>
</html>
