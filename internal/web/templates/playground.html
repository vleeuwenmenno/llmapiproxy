<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM API Proxy — Playground</title>
    <link rel="stylesheet" href="/ui/static/main.css">
    <link rel="stylesheet" href="/ui/static/playground.css">
</head>
<body>
    <div class="noise"></div>
    <nav>
        <div class="logo">
            <div class="icon">&#9889;</div>
            LLM API Proxy{{if appVersion}} <span class="version">{{appVersion}}</span>{{end}}
        </div>
        <div class="links">
            <a href="/ui/">Dashboard</a>
            <a href="/ui/models">Models</a>
            <a href="/ui/playground" class="active">Playground</a>
            <a href="/ui/settings">Settings</a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">&#9728;</button>
        {{if .User}}<span class="user-badge">{{.User.Username}}<form method="POST" action="/ui/logout" style="display:inline"><button type="submit" class="logout-btn" data-tooltip="Logout" aria-label="Logout"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></form></span>{{end}}
        </div>
    </nav>

    <div class="workspace">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- The playground authenticates automatically using an internal "playground" client key — no manual key selection needed. -->
            <input type="hidden" id="api-key" value="{{.PlaygroundAPIKey}}">

            <div class="section-label">Model</div>
            <div class="field">
                <label for="model-input">Model</label>
                <div class="combo-wrap" id="model-combo">
                    <input type="text" class="combo-input" id="model-input" placeholder="Search or type a model…" autocomplete="off">
                    <svg class="combo-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                    <div class="combo-list" id="model-list"></div>
                </div>
            </div>

            <hr class="divider">
            <div class="section-label">Parameters</div>
            <div class="field">
                <label>Temperature</label>
                <div class="range-row">
                    <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.7">
                    <span class="range-val" id="temp-val">0.70</span>
                </div>
            </div>
            <div class="field">
                <label>Max tokens</label>
                <div class="range-row">
                    <input type="range" id="max-tokens" min="0" max="100" step="1" value="9">
                    <span class="range-val" id="tok-val">1 K</span>
                </div>
            </div>
            <div class="field">
                <label>Top-p</label>
                <div class="range-row">
                    <input type="range" id="top-p" min="0" max="1" step="0.05" value="1">
                    <span class="range-val" id="topp-val">1.00</span>
                </div>
            </div>

            <hr class="divider">
            <div class="section-label">System Prompt</div>
            <div class="field">
                <textarea id="sys-prompt" class="sys-prompt-area" placeholder="Optional system prompt…"></textarea>
            </div>

            <hr class="divider">
            <button class="clear-chat-btn" id="clear-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                Clear conversation
            </button>
        </aside>

        <!-- Chat -->
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="empty-state" id="empty-state">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <p>Select a model and start chatting.</p>
                </div>
            </div>

            <div class="error-banner" id="error-banner"></div>

            <div class="token-bar">
                <div class="tok-stat">Prompt: <span id="tok-prompt">—</span></div>
                <div class="tok-stat">Completion: <span id="tok-completion">—</span></div>
                <div class="tok-stat">Total: <span id="tok-total">—</span></div>
                <div class="tok-stat" style="margin-left:auto;">
                    <div class="status-wrap">
                        <div class="status-dot" id="status-dot"></div>
                        <span id="status-text">Ready</span>
                    </div>
                </div>
            </div>

            <div class="input-bar">
                <div class="input-wrap">
                    <textarea id="user-input" rows="1" placeholder="Type a message… (Shift+Enter for newline, Enter to send)"></textarea>
                </div>
                <button class="send-btn" id="send-btn" disabled>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    Send
                </button>
            </div>
        </div>
    </div>

<script src="/ui/static/shared.js"></script>
<script>
// === STATE ===
var chatHistory = [];
var isLoading = false;
var totalPrompt = 0, totalCompletion = 0;

// === DOM ===
var messagesEl = document.getElementById('messages');
var emptyState  = document.getElementById('empty-state');
var userInput   = document.getElementById('user-input');
var sendBtn     = document.getElementById('send-btn');
var clearBtn    = document.getElementById('clear-btn');
var errorBanner = document.getElementById('error-banner');
var statusDot   = document.getElementById('status-dot');
var statusText  = document.getElementById('status-text');

// === MODEL COMBOBOX ===
var allModels = {{json .Models}};
var activeIdx = -1;

function renderList(items) {
    var list = document.getElementById('model-list');
    list.innerHTML = '';
    activeIdx = -1;
    if (items.length === 0) {
        var e = document.createElement('div');
        e.className = 'combo-empty';
        e.textContent = 'No matches — your input will be used as-is';
        list.appendChild(e);
    } else {
        items.forEach(function(m, i) {
            var el = document.createElement('div');
            el.className = 'combo-item';
            var id = modelID(m);
            var nameSpan = document.createElement('span');
            nameSpan.className = 'combo-model-name';
            nameSpan.textContent = id;
            el.appendChild(nameSpan);
            if (typeof m === 'object' && (m.context_length || m.max_output_tokens)) {
                var metaSpan = document.createElement('span');
                metaSpan.className = 'combo-model-meta';
                var tags = [];
                if (m.context_length)    tags.push(fmtCtx(m.context_length) + ' ctx');
                if (m.max_output_tokens) tags.push(fmtCtx(m.max_output_tokens) + ' out');
                metaSpan.textContent = tags.join('  ');
                el.appendChild(metaSpan);
            }
            el.addEventListener('mousedown', function(ev) {
                ev.preventDefault();
                document.getElementById('model-input').value = id;
                closeList();
            });
            list.appendChild(el);
        });
    }
}

function openList(items) {
    renderList(items);
    document.getElementById('model-list').classList.add('open');
}

function closeList() {
    document.getElementById('model-list').classList.remove('open');
    activeIdx = -1;
}

function filteredModels(q) {
    if (!q) return allModels;
    var lq = q.toLowerCase();
    return allModels.filter(function(m) { return modelID(m).toLowerCase().indexOf(lq) !== -1; });
}

(function() {
    var input = document.getElementById('model-input');
    var list  = document.getElementById('model-list');

    input.addEventListener('focus', function() {
        openList(filteredModels(input.value));
    });
    input.addEventListener('input', function() {
        openList(filteredModels(input.value));
    });
    input.addEventListener('blur', function() {
        setTimeout(closeList, 150);
    });
    input.addEventListener('keydown', function(e) {
        var items = list.querySelectorAll('.combo-item');
        if (!items.length) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIdx = Math.min(activeIdx + 1, items.length - 1);
            items.forEach(function(el, i) { el.classList.toggle('active', i === activeIdx); });
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIdx = Math.max(activeIdx - 1, 0);
            items.forEach(function(el, i) { el.classList.toggle('active', i === activeIdx); });
        } else if (e.key === 'Enter' && activeIdx >= 0) {
            e.preventDefault();
            input.value = items[activeIdx].dataset.modelId || items[activeIdx].querySelector('.combo-model-name').textContent;
            closeList();
        } else if (e.key === 'Escape') {
            closeList();
        }
    });
})();

async function fetchModels() {
    var list = document.getElementById('model-list');
    list.innerHTML = '<div class="combo-spinner"><div class="dots"><span></span><span></span><span></span></div> Loading models…</div>';
    list.classList.add('open');
    try {
        var resp = await fetch('/ui/playground/models');
        if (!resp.ok) throw new Error(resp.status);
        var data = await resp.json();
        allModels = data || [];
        var input = document.getElementById('model-input');
        openList(filteredModels(input.value));
        if (!input.value && allModels.length > 0) {
            input.value = modelID(allModels[0]);
            closeList();
        }
    } catch(e) {
        list.innerHTML = '<div class="combo-empty">Failed to load models</div>';
    }
}

// Fetch models on page load
fetchModels();

// === RANGE DISPLAY ===
document.getElementById('temperature').addEventListener('input', function() {
    document.getElementById('temp-val').textContent = parseFloat(this.value).toFixed(2);
});
document.getElementById('max-tokens').addEventListener('input', function() {
    document.getElementById('tok-val').textContent = formatTokens(posToTokens(parseInt(this.value)));
});
document.getElementById('top-p').addEventListener('input', function() {
    document.getElementById('topp-val').textContent = parseFloat(this.value).toFixed(2);
});

// === AUTO-RESIZE TEXTAREA ===
userInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 160) + 'px';
    sendBtn.disabled = this.value.trim() === '' || isLoading;
});

// Send on Enter (Shift+Enter = newline)
userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
    }
});

// === CLEAR ===
clearBtn.addEventListener('click', function() {
    chatHistory = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = '';
    totalPrompt = 0; totalCompletion = 0;
    updateTokenStats();
    setStatus('', 'Ready');
    hideError();
});

// === SEND ===
async function sendMessage() {
    var text = userInput.value.trim();
    if (!text || isLoading) return;

    hideError();
    emptyState.style.display = 'none';
    isLoading = true;
    sendBtn.disabled = true;
    setStatus('', 'Waiting…');

    chatHistory.push({ role: 'user', content: text });
    appendMessage('user', text);
    userInput.value = '';
    userInput.style.height = 'auto';


    try {
        var apiKey      = document.getElementById('api-key').value;
        var modelId     = document.getElementById('model-input').value.trim();
        var sysPrompt   = document.getElementById('sys-prompt').value.trim();
        var temperature = parseFloat(document.getElementById('temperature').value);
        var maxTokens   = posToTokens(parseInt(document.getElementById('max-tokens').value));
        var topP        = parseFloat(document.getElementById('top-p').value);

        var messages = sysPrompt
            ? [{ role: 'system', content: sysPrompt }].concat(chatHistory)
            : chatHistory.slice();

        var body = {
            model: modelId,
            messages: messages,
            temperature: temperature,
            max_tokens: maxTokens,
            top_p: topP,
            stream: true
        };

        var t0 = performance.now();
        var resp = await fetch('/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + apiKey
            },
            body: JSON.stringify(body)
        });

        if (!resp.ok) {
            var errText = await resp.text();
            throw new Error(resp.status + ' ' + resp.statusText + ': ' + errText.slice(0, 300));
        }

        // Create assistant bubble immediately with thinking dots
        var assistantText = '';
        var firstToken = false;
        var msgWrap = appendMessage('assistant', '', null);
        var msgBody = msgWrap.querySelector('.msg-body');
        msgBody.innerHTML = '<span class="inline-thinking"><span class="dots"><span></span><span></span><span></span></span> Thinking…</span>';
        var metaEl  = document.createElement('div');
        metaEl.className = 'msg-meta';
        msgWrap.querySelector('div[style]').appendChild(metaEl);

        // Read the SSE stream
        var reader  = resp.body.getReader();
        var decoder = new TextDecoder();
        var buf     = '';
        var promptTokens = 0, completionTokens = 0;

        outer: while (true) {
            var chunk = await reader.read();
            if (chunk.done) break;
            buf += decoder.decode(chunk.value, { stream: true });

            var lines = buf.split('\n');
            buf = lines.pop(); // keep incomplete last line

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line || line === ':') continue;           // keep-alive
                if (!line.startsWith('data:')) continue;

                var payload = line.slice(5).trim();
                if (payload === '[DONE]') break outer;

                var evt;
                try { evt = JSON.parse(payload); } catch(e) { continue; }

                // Some backends send an error object in the stream
                if (evt.error) throw new Error(evt.error.message || JSON.stringify(evt.error));

                var delta = evt.choices && evt.choices[0] && evt.choices[0].delta;
                if (delta && delta.content) {
                    if (!firstToken) {
                        firstToken = true;
                        setStatus('streaming', 'Streaming…');
                        msgBody.textContent = ''; // clear thinking dots
                    }
                    assistantText += delta.content;
                    msgBody.textContent = assistantText;
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                }

                // Accumulate usage if the backend sends it in the final chunk
                if (evt.usage) {
                    promptTokens     = evt.usage.prompt_tokens     || 0;
                    completionTokens = evt.usage.completion_tokens || 0;
                }
            }
        }

        var elapsed = ((performance.now() - t0) / 1000).toFixed(2);
        metaEl.textContent = elapsed + 's · ' + modelId;

        chatHistory.push({ role: 'assistant', content: assistantText });

        if (promptTokens || completionTokens) {
            totalPrompt     += promptTokens;
            totalCompletion += completionTokens;
            updateTokenStats();
        }
        setStatus('', 'Ready');
    } catch(e) {
        showError(e.message);
        setStatus('err', 'Error');
        chatHistory.pop();
    }

    isLoading = false;
    sendBtn.disabled = userInput.value.trim() === '';
    userInput.focus();
}

sendBtn.addEventListener('click', sendMessage);

// === DOM HELPERS ===
function appendMessage(role, content, meta) {
    var wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    var avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? 'You' : 'AI';

    var body = document.createElement('div');
    body.className = 'msg-body';
    body.textContent = content;

    var bodyWrap = document.createElement('div');
    bodyWrap.style.flex = '1';
    bodyWrap.style.minWidth = '0';
    bodyWrap.appendChild(body);

    if (meta) {
        var metaEl = document.createElement('div');
        metaEl.className = 'msg-meta';
        metaEl.textContent = meta;
        bodyWrap.appendChild(metaEl);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bodyWrap);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
}

function showError(msg) {
    errorBanner.textContent = '⚠ ' + msg;
    errorBanner.classList.add('visible');
}
function hideError() { errorBanner.classList.remove('visible'); }

function setStatus(state, label) {
    statusDot.className = 'status-dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
    statusText.textContent = label;
}

function updateTokenStats() {
    document.getElementById('tok-prompt').textContent     = totalPrompt     || '—';
    document.getElementById('tok-completion').textContent = totalCompletion || '—';
    document.getElementById('tok-total').textContent      = (totalPrompt + totalCompletion) || '—';
}
</script>
</body>
</html>
