<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM API Proxy — Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0a0e17;
            --surface: #111827;
            --surface-2: #1a2332;
            --border: #1e2d3d;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.1);
            --green: #34d399;
            --red: #f87171;
            --amber: #fbbf24;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Outfit', sans-serif;
        }

        body.light {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-2: #f1f5f9;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-dim: #64748b;
            --accent: #0891b2;
            --accent-dim: rgba(8, 145, 178, 0.1);
            --green: #059669;
            --red: #dc2626;
            --amber: #d97706;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        nav .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        nav .logo .icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        nav .links {
            display: flex;
            gap: 0.25rem;
        }

        nav .links a {
            color: var(--text-dim);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.15s;
        }

        nav .links a:hover, nav .links a.active {
            color: var(--text);
            background: var(--accent-dim);
        }

        nav .links a.active {
            color: var(--accent);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: -0.03em;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: rgba(34, 211, 238, 0.3);
        }

        .card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .card .value {
            font-family: var(--mono);
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .card .sub {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
            font-family: var(--mono);
        }

        .accent { color: var(--accent); }
        .green { color: var(--green); }
        .red { color: var(--red); }
        .amber { color: var(--amber); }

        .section-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            background: var(--surface-2);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 0.6rem 1rem;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 0.75rem;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td {
            background: var(--accent-dim);
        }

        .status-ok {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .status-err {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
            box-shadow: 0 0 6px var(--red);
        }

        .backend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .backend-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
        }

        .backend-card .name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .backend-card .name .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
        }

        .backend-card .row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            padding: 0.25rem 0;
            color: var(--text-dim);
        }

        .backend-card .row span:last-child {
            font-family: var(--mono);
            color: var(--text);
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        .window-selector {
            display: flex;
            gap: 0.35rem;
            align-items: center;
        }

        .window-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            padding: 0.25rem 0.65rem;
            border-radius: 5px;
            font-size: 0.75rem;
            font-family: var(--mono);
            transition: all 0.15s;
        }

        .window-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .window-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .dash-header h1 { margin-bottom: 0; }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1rem 0 2rem;
        }

        .page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--sans);
            transition: all 0.15s;
        }

        .page-btn:hover:not([disabled]) {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-btn[disabled] {
            opacity: 0.35;
            cursor: default;
        }

        .page-info {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            font-size: 1rem;
            line-height: 1;
            transition: all 0.15s;
            margin-left: 0.5rem;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        body { transition: background 0.2s, color 0.2s; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <nav>
        <div class="logo">
            <div class="icon">&#9889;</div>
            LLM API Proxy
        </div>
        <div class="links">
            <a href="/ui/" class="active">Dashboard</a>
            <a href="/ui/analytics">Analytics</a>
            <a href="/ui/models">Models</a>
            <a href="/ui/playground">Playground</a>
            <a href="/ui/settings">Settings</a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">☀</button>
        </div>
    </nav>
    <main>
        <div class="dash-header">
            <h1>Dashboard</h1>
            <div class="window-selector">
                <button class="window-btn" data-window="1h">1h</button>
                <button class="window-btn" data-window="2h">2h</button>
                <button class="window-btn" data-window="3h">3h</button>
                <button class="window-btn" data-window="6h">6h</button>
                <button class="window-btn" data-window="12h">12h</button>
            </div>
        </div>

        <!-- Summary cards — the card <div> elements are permanent; only inner text is updated -->
        <div class="cards">
            <div class="card">
                <div class="label" id="d-req-label">Requests</div>
                <div class="value accent" id="d-req">—</div>
                <div class="sub" id="d-req-sub">&nbsp;</div>
            </div>
            <div class="card">
                <div class="label" id="d-tok-label">Tokens</div>
                <div class="value" id="d-tok">—</div>
                <div class="sub" id="d-tok-sub">&nbsp;</div>
            </div>
            <div class="card">
                <div class="label" id="d-lat-label">Avg Latency</div>
                <div class="value green" id="d-lat">—</div>
                <div class="sub" id="d-lat-sub">&nbsp;</div>
            </div>
            <div class="card">
                <div class="label" id="d-err-label">Errors</div>
                <div class="value green" id="d-err">—</div>
                <div class="sub" id="d-err-sub">&nbsp;</div>
            </div>
        </div>

        <div class="section-title">Backends</div>
        <div class="backend-grid" id="d-backends-grid">
            <div class="empty">Loading…</div>
        </div>

        <div id="d-clients-section" style="display:none">
            <div class="section-title">Clients</div>
            <div class="backend-grid" id="d-clients-grid"></div>
        </div>

        <div class="section-title" style="justify-content:space-between">
            <span>Recent Requests</span>
            <span id="d-recent-meta" style="font-size:0.75rem;color:var(--text-dim);text-transform:none;letter-spacing:0"></span>
        </div>
        <table>
            <thead>
                <tr>
                    <th></th>
                    <th>Time</th>
                    <th>Backend</th>
                    <th>Model</th>
                    <th>Tokens</th>
                    <th>Latency</th>
                    <th>Stream</th>
                    <th>Client</th>
                </tr>
            </thead>
            <tbody id="d-recent-tbody">
                <tr><td colspan="8" class="empty">Loading…</td></tr>
            </tbody>
        </table>
        <div class="pagination" id="d-recent-pag"></div>
    </main>
    <div id="detail-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto" onclick="if(event.target===this)this.style.display='none'">
      <div id="detail-content" style="max-width:700px;margin:4rem auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem"></div>
    </div>
<script>
// ── Theme ─────────────────────────────────────────────────────────────────
(function() {
    var saved = localStorage.getItem('theme') || 'dark';
    if (saved === 'light') document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = document.body.classList.contains('light') ? '🌙' : '☀';
})();
function toggleTheme() {
    var isLight = document.body.classList.toggle('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀';
}

// ── Helpers ───────────────────────────────────────────────────────────────
function fmtDur(ms) {
    if (!ms) return '0ms';
    if (ms < 1000) return ms + 'ms';
    return (ms / 1000).toFixed(2) + 's';
}
function fmtNum(n) {
    if (n === undefined || n === null) return '—';
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
    return String(n);
}
function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setText(id, val) { document.getElementById(id).textContent = val; }

// ── State ─────────────────────────────────────────────────────────────────
var dashWin   = localStorage.getItem('dashWindow') || '1h';
var dashPage  = 0;
var dashTimer = null;

// ── Boot ──────────────────────────────────────────────────────────────────
(function() {
    document.querySelectorAll('.window-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.window === dashWin);
        btn.addEventListener('click', function() {
            dashWin  = btn.dataset.window;
            dashPage = 0;
            localStorage.setItem('dashWindow', dashWin);
            document.querySelectorAll('.window-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.window === dashWin);
            });
            fetchDash();
        });
    });
    fetchDash();
})();

// ── Fetch ─────────────────────────────────────────────────────────────────
function fetchDash(page) {
    if (page !== undefined) dashPage = page;
    clearTimeout(dashTimer);
    fetch('/ui/dashboard/data?window=' + dashWin + '&page=' + dashPage)
        .then(function(r) { return r.json(); })
        .then(function(d) {
            renderDash(d);
            dashTimer = setTimeout(fetchDash, 10000);
        })
        .catch(function() {
            dashTimer = setTimeout(fetchDash, 10000);
        });
}

// ── Render ────────────────────────────────────────────────────────────────
function renderDash(d) {
    var lbl = d.window_label || dashWin;
    var ws  = d.window_stats || {};
    var td  = d.today        || {};
    var at  = d.all_time     || {};

    // Cards — update textContent only; card <div> nodes are never removed so no animation fires
    setText('d-req-label', 'Requests (' + lbl + ')');
    setText('d-req',       fmtNum(ws.total_requests));
    setText('d-req-sub',   fmtNum(td.total_requests) + ' today · ' + fmtNum(at.total_requests) + ' all time');

    setText('d-tok-label', 'Tokens (' + lbl + ')');
    setText('d-tok',       fmtNum(ws.total_tokens));
    setText('d-tok-sub',   fmtNum(td.total_tokens) + ' today · ' + fmtNum(at.total_tokens) + ' all time');

    setText('d-lat-label', 'Avg Latency (' + lbl + ')');
    setText('d-lat',       fmtDur(ws.avg_latency_ms));
    setText('d-lat-sub',   fmtDur(at.avg_latency_ms) + ' all time');

    setText('d-err-label', 'Errors (' + lbl + ')');
    setText('d-err',       fmtNum(ws.total_errors));
    setText('d-err-sub',   fmtNum(td.total_errors) + ' today · ' + fmtNum(at.total_errors) + ' all time');
    document.getElementById('d-err').className = 'value ' + ((ws.total_errors || 0) > 0 ? 'red' : 'green');

    // Backends grid
    var backends = d.backends || [];
    document.getElementById('d-backends-grid').innerHTML = backends.length > 0
        ? backends.map(function(b) {
            return '<div class="backend-card">'
                + '<div class="name"><span class="dot"></span> ' + esc(b.name) + '</div>'
                + '<div class="row"><span>Requests</span><span>' + fmtNum(b.requests) + '</span></div>'
                + '<div class="row"><span>Tokens</span><span>'   + fmtNum(b.tokens)   + '</span></div>'
                + '<div class="row"><span>Errors</span><span>'   + fmtNum(b.errors)   + '</span></div>'
                + '</div>';
          }).join('')
        : '<div class="empty">No backend activity in this window.</div>';

    // Clients grid
    var clients = d.clients || [];
    var csEl = document.getElementById('d-clients-section');
    if (clients.length > 0) {
        csEl.style.display = '';
        document.getElementById('d-clients-grid').innerHTML = clients.map(function(c) {
            return '<div class="backend-card">'
                + '<div class="name"><span class="dot"></span> ' + esc(c.name || '(anonymous)') + '</div>'
                + '<div class="row"><span>Requests</span><span>' + fmtNum(c.requests) + '</span></div>'
                + '<div class="row"><span>Tokens</span><span>'   + fmtNum(c.tokens)   + '</span></div>'
                + '</div>';
        }).join('');
    } else {
        csEl.style.display = 'none';
    }

    // Recent requests
    var rec   = d.recent || {};
    var items = rec.items || [];
    if (rec.total > 0) {
        var from = rec.page * 25 + 1;
        var to   = Math.min((rec.page + 1) * 25, rec.total);
        setText('d-recent-meta', from + '–' + to + ' of ' + rec.total);
    } else {
        setText('d-recent-meta', '');
    }

    document.getElementById('d-recent-tbody').innerHTML = items.length > 0
        ? items.map(function(r) {
            return '<tr style="cursor:pointer" onclick="showDetail(' + r.id + ')">'
                + '<td>' + (r.error ? '<span class="status-err" title="' + esc(r.error) + '"></span>' : '<span class="status-ok"></span>') + '</td>'
                + '<td>' + fmtTime(r.timestamp) + '</td>'
                + '<td>' + esc(r.backend) + '</td>'
                + '<td>' + esc(r.model) + '</td>'
                + '<td>' + fmtNum(r.total_tokens) + '</td>'
                + '<td>' + fmtDur(r.latency_ms) + '</td>'
                + '<td>' + (r.stream ? 'SSE' : '—') + '</td>'
                + '<td>' + esc(r.client) + '</td>'
                + '</tr>';
          }).join('')
        : '<tr><td colspan="8" class="empty">No requests recorded in this window.</td></tr>';

    // Pagination
    var pag = document.getElementById('d-recent-pag');
    if (!rec.total_pages || rec.total_pages <= 1) {
        pag.innerHTML = '';
    } else {
        pag.innerHTML =
            (rec.page > 0
                ? '<button class="page-btn" onclick="fetchDash(' + (rec.page - 1) + ')">&#8592; Prev</button>'
                : '<button class="page-btn" disabled>&#8592; Prev</button>')
            + '<span class="page-info">Page ' + (rec.page + 1) + ' / ' + rec.total_pages + '</span>'
            + (rec.page + 1 < rec.total_pages
                ? '<button class="page-btn" onclick="fetchDash(' + (rec.page + 1) + ')">Next &#8594;</button>'
                : '<button class="page-btn" disabled>Next &#8594;</button>');
    }
}

// ── Detail modal ──────────────────────────────────────────────────────────
function showDetail(id) {
    var modal   = document.getElementById('detail-modal');
    var content = document.getElementById('detail-content');
    modal.style.display = 'block';
    content.innerHTML = '<p style="color:var(--text-dim)">Loading...</p>';
    fetch('/ui/stats/detail?id=' + id)
        .then(function(r) { return r.text(); })
        .then(function(html) { content.innerHTML = html; });
}
</script>
</body>
</html>
