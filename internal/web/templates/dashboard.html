<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM API Proxy — Dashboard</title>
    <script src="/ui/static/htmx.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0a0e17;
            --surface: #111827;
            --surface-2: #1a2332;
            --border: #1e2d3d;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.1);
            --green: #34d399;
            --red: #f87171;
            --amber: #fbbf24;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Outfit', sans-serif;
        }

        body.light {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-2: #f1f5f9;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-dim: #64748b;
            --accent: #0891b2;
            --accent-dim: rgba(8, 145, 178, 0.1);
            --green: #059669;
            --red: #dc2626;
            --amber: #d97706;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        nav .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        nav .logo .icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        nav .links {
            display: flex;
            gap: 0.25rem;
        }

        nav .links a {
            color: var(--text-dim);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.15s;
        }

        nav .links a:hover, nav .links a.active {
            color: var(--text);
            background: var(--accent-dim);
        }

        nav .links a.active {
            color: var(--accent);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: -0.03em;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: rgba(34, 211, 238, 0.3);
        }

        .card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .card .value {
            font-family: var(--mono);
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .card .sub {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
            font-family: var(--mono);
        }

        .accent { color: var(--accent); }
        .green { color: var(--green); }
        .red { color: var(--red); }
        .amber { color: var(--amber); }

        .section-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            background: var(--surface-2);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 0.6rem 1rem;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 0.75rem;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td {
            background: var(--accent-dim);
        }

        .status-ok {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .status-err {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
            box-shadow: 0 0 6px var(--red);
        }

        .backend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .backend-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
        }

        .backend-card .name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .backend-card .name .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
        }

        .backend-card .row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            padding: 0.25rem 0;
            color: var(--text-dim);
        }

        .backend-card .row span:last-child {
            font-family: var(--mono);
            color: var(--text);
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cards .card, .backend-card {
            animation: fadeIn 0.3s ease both;
        }
        .cards .card:nth-child(2) { animation-delay: 0.05s; }
        .cards .card:nth-child(3) { animation-delay: 0.1s; }
        .cards .card:nth-child(4) { animation-delay: 0.15s; }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1rem 0 2rem;
        }

        .page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--sans);
            transition: all 0.15s;
        }

        .page-btn:hover:not([disabled]) {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-btn[disabled] {
            opacity: 0.35;
            cursor: default;
        }

        .page-info {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            font-size: 1rem;
            line-height: 1;
            transition: all 0.15s;
            margin-left: 0.5rem;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        body { transition: background 0.2s, color 0.2s; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <nav>
        <div class="logo">
            <div class="icon">&#9889;</div>
            LLM API Proxy
        </div>
        <div class="links">
            <a href="/ui/" class="active">Dashboard</a>
            <a href="/ui/models">Models</a>
            <a href="/ui/settings">Settings</a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">☀</button>
        </div>
    </nav>
    <main>
        <div id="quota-section" hx-get="/ui/quota" hx-trigger="load" hx-swap="innerHTML"></div>
        <div id="stats-content" hx-get="/ui/stats" hx-trigger="every 10s" hx-swap="innerHTML">
            {{template "stats_fragment.html" .}}
        </div>
    </main>
    <div id="detail-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto" onclick="if(event.target===this)this.style.display='none'">
      <div id="detail-content" style="max-width:700px;margin:4rem auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem"></div>
    </div>
</body>
<script>
(function() {
    var saved = localStorage.getItem('theme') || 'dark';
    if (saved === 'light') document.body.classList.add('light');
    else if (saved === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches) document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = document.body.classList.contains('light') ? '🌙' : '☀';
})();
function toggleTheme() {
    var isLight = document.body.classList.toggle('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀';
}
function showDetail(id) {
    var modal = document.getElementById('detail-modal');
    var content = document.getElementById('detail-content');
    modal.style.display = 'block';
    content.innerHTML = '<p style="color:var(--text-dim)">Loading...</p>';
    fetch('/ui/stats/detail?id=' + id)
        .then(r => r.text())
        .then(html => { content.innerHTML = html; });
}
</script>
</html>
