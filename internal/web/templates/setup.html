<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM API Proxy — Initial Setup</title>
    <link rel="stylesheet" href="/ui/static/main.css">
    <link rel="stylesheet" href="/ui/static/setup.css">
</head>
<body>
    <div class="noise"></div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">&#9728;</button>

    <div class="setup-card">
        <div class="logo">
            <div class="icon">&#9889;</div>
            <span>LLM API Proxy</span>
        </div>
        <p class="subtitle">Create the first admin account</p>
        <div class="info-box">
            No users are registered yet. Create an admin account to secure the dashboard.
            You can manage additional users later via the CLI: <code>llmapiproxy user add &lt;name&gt;</code>
        </div>

        {{if .Error}}
        <div class="msg error">{{.Error}}</div>
        {{end}}

        <form method="POST" action="/ui/setup" id="setupForm" onsubmit="return validateForm()">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a strong password" autocomplete="new-password" required oninput="checkStrength()">
                <div class="password-strength"><div class="bar" id="strengthBar"></div></div>
            </div>
            <div class="form-group">
                <label for="password2">Confirm Password</label>
                <input type="password" id="password2" name="password2" placeholder="Repeat password" autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Create Admin &amp; Sign In</button>
        </form>
    </div>

    <script>
    (function() {
        const saved = localStorage.getItem('theme') || 'dark';
        applyTheme(saved);
    })();

    function applyTheme(theme) {
        if (theme === 'system') {
            document.body.classList.toggle('light', !window.matchMedia('(prefers-color-scheme: dark)').matches);
        } else {
            document.body.classList.toggle('light', theme === 'light');
        }
        document.getElementById('themeBtn').textContent = document.body.classList.contains('light') ? '\uD83C\uDF19' : '\u2600';
    }

    function toggleTheme() {
        var current = localStorage.getItem('theme') || 'dark';
        var next = current === 'light' ? 'dark' : 'light';
        localStorage.setItem('theme', next);
        applyTheme(next);
    }

    function checkStrength() {
        var pw = document.getElementById('password').value;
        var bar = document.getElementById('strengthBar');
        var score = 0;
        if (pw.length >= 8) score++;
        if (pw.length >= 12) score++;
        if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
        if (/\d/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        var pct = Math.min(score / 5 * 100, 100);
        var colors = ['var(--red)', 'var(--red)', 'var(--amber)', 'var(--amber)', 'var(--green)', 'var(--green)'];
        bar.style.width = pct + '%';
        bar.style.background = colors[score];
    }

    function validateForm() {
        var pw = document.getElementById('password').value;
        var pw2 = document.getElementById('password2').value;
        if (pw !== pw2) {
            alert('Passwords do not match.');
            return false;
        }
        if (pw.length < 8) {
            alert('Password must be at least 8 characters.');
            return false;
        }
        return true;
    }
    </script>
</body>
</html>
