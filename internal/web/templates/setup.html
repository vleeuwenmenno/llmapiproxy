<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM API Proxy — Initial Setup</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0a0e17;
            --surface: #111827;
            --surface-2: #1a2332;
            --border: #1e2d3d;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.1);
            --green: #34d399;
            --red: #f87171;
            --amber: #fbbf24;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Outfit', sans-serif;
        }

        body.light {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-2: #f1f5f9;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-dim: #64748b;
            --accent: #0891b2;
            --accent-dim: rgba(8, 145, 178, 0.1);
            --green: #059669;
            --red: #dc2626;
            --amber: #d97706;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
        }

        .setup-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .setup-card .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .setup-card .logo .icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .setup-card .logo span {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
        }

        .setup-card .subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }

        .setup-card .info-box {
            background: var(--accent-dim);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.82rem;
            color: var(--accent);
            text-align: center;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.65rem 0.85rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-dim);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            font-family: var(--sans);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #818cf8);
            color: #0a0e17;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .msg {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            font-size: 0.85rem;
            text-align: center;
        }

        .msg.error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--red);
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            font-size: 1rem;
            line-height: 1;
            transition: all 0.15s;
            z-index: 200;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .password-strength {
            margin-top: 0.35rem;
            height: 3px;
            border-radius: 2px;
            background: var(--border);
            overflow: hidden;
            transition: all 0.2s;
        }

        .password-strength .bar {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">&#9728;</button>

    <div class="setup-card">
        <div class="logo">
            <div class="icon">&#9889;</div>
            <span>LLM API Proxy</span>
        </div>
        <p class="subtitle">Create the first admin account</p>
        <div class="info-box">
            No users are registered yet. Create an admin account to secure the dashboard.
            You can manage additional users later via the CLI: <code>llmapiproxy user add &lt;name&gt;</code>
        </div>

        {{if .Error}}
        <div class="msg error">{{.Error}}</div>
        {{end}}

        <form method="POST" action="/ui/setup" id="setupForm" onsubmit="return validateForm()">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a strong password" autocomplete="new-password" required oninput="checkStrength()">
                <div class="password-strength"><div class="bar" id="strengthBar"></div></div>
            </div>
            <div class="form-group">
                <label for="password2">Confirm Password</label>
                <input type="password" id="password2" name="password2" placeholder="Repeat password" autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Create Admin &amp; Sign In</button>
        </form>
    </div>

    <script>
    (function() {
        const saved = localStorage.getItem('theme') || 'dark';
        applyTheme(saved);
    })();

    function applyTheme(theme) {
        if (theme === 'system') {
            document.body.classList.toggle('light', !window.matchMedia('(prefers-color-scheme: dark)').matches);
        } else {
            document.body.classList.toggle('light', theme === 'light');
        }
        document.getElementById('themeBtn').textContent = document.body.classList.contains('light') ? '\uD83C\uDF19' : '\u2600';
    }

    function toggleTheme() {
        var current = localStorage.getItem('theme') || 'dark';
        var next = current === 'light' ? 'dark' : 'light';
        localStorage.setItem('theme', next);
        applyTheme(next);
    }

    function checkStrength() {
        var pw = document.getElementById('password').value;
        var bar = document.getElementById('strengthBar');
        var score = 0;
        if (pw.length >= 8) score++;
        if (pw.length >= 12) score++;
        if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
        if (/\d/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        var pct = Math.min(score / 5 * 100, 100);
        var colors = ['var(--red)', 'var(--red)', 'var(--amber)', 'var(--amber)', 'var(--green)', 'var(--green)'];
        bar.style.width = pct + '%';
        bar.style.background = colors[score];
    }

    function validateForm() {
        var pw = document.getElementById('password').value;
        var pw2 = document.getElementById('password2').value;
        if (pw !== pw2) {
            alert('Passwords do not match.');
            return false;
        }
        if (pw.length < 8) {
            alert('Password must be at least 8 characters.');
            return false;
        }
        return true;
    }
    </script>
</body>
</html>
