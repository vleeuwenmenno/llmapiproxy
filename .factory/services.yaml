commands:
  install: go mod download
  build: go build ./cmd/llmapiproxy
  test: go test ./... 2>&1 | grep -E "(ok|FAIL|---)" | head -30
  lint: go vet ./...
  typecheck: go build ./...
  run: ./llmapiproxy serve

services:
  llmapiproxy:
    start: ./llmapiproxy serve
    stop: lsof -ti :8000 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:8000/health
    port: 8000
    depends_on: []
