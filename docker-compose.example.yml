# docker-compose.example.yml — production reference
#
# Copy this file to docker-compose.yml and provide your own config.yaml.
#
# By default, stats.db, chat.db, and tokens/ are stored under data/ relative
# to the working directory (or /app/data inside the container). Mount the
# data/ directory to persist data across container restarts.
#
# Then run:
#   docker compose up -d

services:
  llmapiproxy:
    image: ghcr.io/vleeuwenmenno/llmapiproxy:latest
    ports:
      - "8000:8000" # Used for the API and web UI
      - "1455:1455" # Used for the optional OAuth redirect server (if any backends require it)
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
