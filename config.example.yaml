# LLM API Proxy - Example Configuration
# Copy this file to config.yaml and fill in your API keys.

server:
  # Host to bind to. Empty string = all interfaces (0.0.0.0).
  # Use "localhost" or "127.0.0.1" to restrict to local access only.
  # host: ""

  # Port to listen on. Defaults to 8080 if not set.
  port: 8000

  # Legacy: combined host:port (e.g. ":8000", "localhost:8080").
  # If set, it is used as a fallback when host/port are not specified.
  # The host and port fields above take precedence.
  # listen: ":8000"

  # Optional: externally-reachable domain for OAuth callbacks and UI links.
  # Set this when the proxy runs on a different machine from the user's browser,
  # e.g. behind a reverse proxy or on a Tailscale tailnet.
  # Examples:
  #   "myserver"                → http://myserver:<port>
  #   "myserver.tail:8000"      → http://myserver.tail:8000
  #   "https://example.com"     → https://example.com (scheme used verbatim)
  # When empty, the URL is derived from the host/port/listen fields (defaults to localhost).
  # domain: ""

  # API keys that clients must use to authenticate with this proxy.
  # Clients send: Authorization: Bearer <one-of-these-keys>
  api_keys:
    - "your-proxy-api-key-here"

  # Enable username/password authentication for the web UI dashboard.
  # When enabled, all /ui/* routes require a valid session cookie.
  # The proxy API (/v1/*) is NOT affected — it continues using API key auth.
  # Manage users via CLI: llmapiproxy user add <username>
  # web_auth: false

  # Path to the SQLite database storing web UI users.
  # Defaults to data/users.db when web_auth is enabled.
  # users_db_path: "/app/data/users.db"

  # HMAC secret for signing session cookies. When empty (default), a random
  # secret is generated on startup — sessions are invalidated on restart.
  # Set this (16+ characters) to persist sessions across restarts.
  # web_auth_secret: ""

  # Path to the SQLite database used to persist request statistics.
  # Defaults to data/stats.db in the current working directory.
  stats_path: "/app/data/stats.db"

  # Path to the SQLite database used for persistent chat sessions.
  # Defaults to data/chat.db in the current working directory.
  chat_db_path: "/app/data/chat.db"

  # Model used to auto-generate chat session titles.
  # Must match a model ID available through one of your backends.
  # If not set, titles default to a truncated version of the first message.
  # title_model: "glm-5-turbo"

  # How long to cache dynamically fetched model lists from upstream providers.
  # Accepts Go duration strings (e.g. "5m", "30s", "1h"). Default: "5m".
  # Set to "0s" to disable caching (every ListModels call hits upstream).
  # model_cache_ttl: "5m"

# ── Identity Spoofing ──────────────────────────────────────────────
# Make the proxy's outgoing requests look like they came from a specific
# CLI tool. This sets User-Agent and custom headers on upstream requests.
#
# Built-in profiles: none, codex-cli, gemini-cli, copilot-vscode, opencode, claude-code
# Default: "none" (passthrough — no spoofing)
#
# WARNING: Identity spoofing is best-effort. It mimics CLI tool request
# signatures but cannot guarantee compatibility. Providers may still
# detect proxy usage and restrict your access.

# Global identity profile (applies to all backends unless overridden).
identity_profile: "opencode"

# Custom identity profiles (in addition to the built-in ones).
# custom_identity_profiles:
#   - id: "my-tool"
#     display_name: "My Custom Tool"
#     user_agent: "my-tool/1.0 ({{.OS}}; {{.Arch}})"
#     headers:
#       X-Custom-Header: "my-value"

backends:
  # ── OpenRouter ─────────────────────────────────────────────
  # Fully OpenAI-compatible. Supports hundreds of models.
  # Get your API key: https://openrouter.ai/keys
  # Models: openrouter/openai/gpt-5.2, openrouter/anthropic/claude-sonnet-4, etc.
  - name: openrouter
    type: openai
    base_url: https://openrouter.ai/api/v1
    api_key: "sk-or-v1-your-openrouter-key"
    # Per-backend identity profile override (optional).
    # Overrides the global identity_profile for this backend only.
    # identity_profile: "opencode"
    extra_headers:
      HTTP-Referer: "https://your-app.example.com"
      X-OpenRouter-Title: "LLM API Proxy"

  # ── Z.ai General API ──────────────────────────────────────
  # OpenAI-compatible API for GLM models.
  # Get your API key: https://z.ai/manage-apikey/apikey-list
  # For Z.ai GLM Coding Plan, use the same API key but the following base_url: https://api.z.ai/api/coding/paas/v4
  # Models: zai/glm-5.1, zai/glm-5-turbo, zai/glm-4.7, etc.
  - name: zai
    type: openai
    base_url: https://api.z.ai/api/paas/v4
    api_key: "your-zai-api-key"
    models:
      # Simple string form — context window is auto-fetched from upstream or looked up from the built-in database.
      - glm-5-turbo
      - glm-4.7
      - glm-4.5-air
      # Object form — use this to pin explicit context/output limits that override upstream data.
      # Useful when the provider doesn't expose this info or you want to restrict it.
      - id: glm-5.1
        context_length: 131072
        max_output_tokens: 8192

  # ── Z.ai Coding Plan ──────────────────────────────────────
  # Dedicated coding endpoint (uses Coding Plan subscription quota).
  # Same API key as Z.ai General.
  # Models: zai-coding/glm-5.1, zai-coding/glm-4.7, etc.
  - name: zai-coding
    type: openai
    base_url: https://api.z.ai/api/coding/paas/v4
    api_key: "your-zai-api-key"
    models:
      - glm-5.1
      - glm-5-turbo
      - glm-4.7
      - glm-4.5-air

  # ── Anthropic-Compatible API ──────────────────────────────
  # Any provider exposing Anthropic-style /v1/messages and /v1/models.
  # Models: anthropic/claude-sonnet-4-5, anthropic/claude-opus-4-6, etc.
  # - name: anthropic
  #   type: anthropic
  #   base_url: https://api.anthropic.com/v1
  #   api_key: "sk-ant-your-key"
  #   extra_headers:
  #     anthropic-version: "2023-06-01"

  # ── OpenCode Zen ───────────────────────────────────────────
  # Curated models for coding agents. Pay-as-you-go.
  # Get your API key: https://opencode.ai/auth
  # Only chat/completions-compatible models in this config (Phase 1).
  # Models: zen/minimax-m2.5, zen/glm-5.1, zen/kimi-k2.5, etc.
  - name: zen
    type: openai
    base_url: https://opencode.ai/zen/v1
    api_key: "your-opencode-zen-key"
    models:
      - minimax-m2.5
      - minimax-m2.5-free
      - glm-5.1
      - glm-5
      - kimi-k2.5
      - big-pickle
      - qwen3.6-plus-free
      - nemotron-3-super-free

  # ── OpenCode Go ────────────────────────────────────────────
  # Low-cost subscription for open coding models. $5 first month, $10/month.
  # Uses the same API key as Zen.
  # Models: go/glm-5.1, go/kimi-k2.5, go/minimax-m2.5, etc.
  #
  # Note: The Go endpoint does not expose a /models endpoint (returns 404).
  # Use models_url to point to the Zen endpoint for model discovery.
  # Chat completions still route to the Go endpoint via base_url.
  - name: go
    type: openai
    base_url: https://opencode.ai/zen/go/v1
    api_key: "your-opencode-go-key"
    models_url: https://opencode.ai/zen/v1
    # disabled_models:          # Optional: models to never route through this backend.
    #   - claude-opus-4-6        # These models won't appear in /v1/models or the web UI
    #   - claude-sonnet-4-6      # for this backend. Other backends are unaffected.
    # model_aliases:             # Optional: rename models before canonicalization.
    #   glm-5.1-precision: glm-5.1  # Makes "glm-5.1-precision" appear as "glm-5.1"

  # ── GitHub Copilot ────────────────────────────────────────
  # Uses GitHub Device Code Flow for authentication.
  # Initiate auth via the web UI: http://localhost:8000/ui/settings
  # The user visits a GitHub URL, enters a code, and authorizes the app.
  # No api_key required. No dependency on gh CLI or env vars.
  # Models: copilot/gpt-4o, copilot/gpt-4.1, copilot/o3, etc.
  # - name: copilot
  #   type: copilot
  #   base_url: https://api.githubcopilot.com
  #   # api_key is NOT needed — authentication uses GitHub Device Code Flow.
  #   # Optionally override the GitHub OAuth client_id (defaults to Copilot VS Code extension ID):
  #   # oauth:
  #   #   client_id: "Iv1.b507a08c87ecfe98"

  # ── OpenAI Codex ──────────────────────────────────────────
  # Uses OAuth PKCE flow for authentication. No api_key required.
  # Initiate auth via the web UI: http://localhost:8000/ui/settings
  # Models: codex/gpt-5.3-codex, codex/gpt-5.2-codex, codex/gpt-5.1-codex, etc.
  # - name: codex
  #   type: codex
  #   base_url: https://chatgpt.com/backend-api/codex
  #   oauth:
  #     # Optional. Omit this to use the built-in Codex client id.
  #     # client_id: "app_EMoamEEZ73f0CkXaXp7hrann"
  #     scopes:
  #       - "openid"
  #       - "profile"
  #       - "email"
  #       - "offline_access"
  #     auth_url: "https://auth.openai.com/oauth/authorize"
  #     token_url: "https://auth.openai.com/oauth/token"
  #   # api_key is NOT needed — authentication uses OAuth.

  # ── Gemini CLI (Google Code Assist) ──────────────────────────
  # Uses Google OAuth 2.0 (web flow). No api_key required.
  # Initiate auth via the web UI Add Backend wizard.
  # You must supply the Google OAuth client credentials from the upstream
  # Gemini CLI open-source project (github.com/google-gemini/gemini-cli).
  # Find the credentials in packages/core/src/code_assist/oauth2.ts — look
  # for CLIENT_ID and CLIENT_SECRET constants.
  # - name: gemini
  #   type: gemini
  #   base_url: https://cloudcode-pa.googleapis.com/v1internal
  #   oauth:
  #     client_id: "<client_id from gemini-cli source>"
  #     client_secret: "<client_secret from gemini-cli source>"
  #     scopes:
  #       - "https://www.googleapis.com/auth/cloud-platform"
  #       - "https://www.googleapis.com/auth/userinfo.email"
  #       - "https://www.googleapis.com/auth/userinfo.profile"
  #     auth_url: "https://accounts.google.com/o/oauth2/v2/auth"
  #     token_url: "https://oauth2.googleapis.com/token"
  #     redirect_uri: "http://127.0.0.1:42857/oauth2callback"
  #   # api_key is NOT needed — authentication uses OAuth.

  # ── Ollama (self-hosted models) ───────────────────────────
  # Run models locally with Ollama. Supports three compatibility modes:
  #   - openai (default): uses /v1/chat/completions — best compatibility
  #   - anthropic: uses /v1/messages — Anthropic-compatible
  #   - native: uses /api/chat — Ollama's own format
  # Model management (pull, delete, show details) available via the web UI.
  # Cloud models (e.g. "glm-4.7:cloud") can be listed under models.
  # - name: ollama
  #   type: ollama
  #   base_url: http://localhost:11434
  #   compat_mode: openai
  #   # No API key needed for local Ollama.
  #   # Optionally restrict to specific models:
  #   # models:
  #   #   - id: llama3.2
  #   #     context_length: 131072
  #   #   - id: qwen3-coder
  #   #   - id: glm-4.7:cloud  # Ollama cloud model (no pull needed)

# ── Clients ──────────────────────────────────────────────────
# Named clients each get their own API key. The name shows up in
# request analytics so you can see which app made which call.
#
# There is one special client called "playground" — the built-in
# Playground web UI authenticates with this key automatically. It
# is hidden from the Settings → API Keys page to prevent accidental
# deletion. Simply add it alongside your other clients:
#
#   - name: playground
#     api_key: "sk-proxy-internal-playground-<random>"
#
clients:
  # # ── Playground (built-in web UI) ─────────────────────────
  # # This internal client is used by the Playground page.
  # # It is automatically excluded from the Settings → API Keys list.
  # # Generate a random key and paste it below.
  # - name: playground
  #   api_key: "sk-proxy-internal-playground-YOUR-KEY-HERE"

  # # ── Your apps ────────────────────────────────────────────
  # - name: vscode
  #   api_key: "sk-proxy-your-vscode-key"

# ── Routing ──────────────────────────────────────────────────
# When the same model ID is served by multiple backends, the
# routing section controls how requests are distributed.
#
# Strategies:
#   priority    — Always prefer the first backend; fall through to
#                 the next only on error. (default)
#   round-robin — Rotate requests evenly across all listed backends.
#                 State is in-memory and resets on restart.
#   race        — Send the request to all backends simultaneously;
#                 the first successful response wins. Streaming is
#                 supported (first backend to deliver ~4 KB wins).
#
# The global strategy applies to every model that doesn't have its
# own per-model override.
#
# routing:
#   strategy: priority   # global default: priority | round-robin | race
#   models:
#     - model: glm-5.1
#       # Optional per-model strategy override (omit to use global).
#       strategy: round-robin
#       backends:
#         - zai-coding
#         - zen
#         - go
#       # Optional: disable specific backends for this model only.
#       # The backends remain in the list above for ordering/visibility
#       # but are excluded from actual routing. Other models are unaffected.
#       # disabled_backends:
#       #   - zai-coding
#     - model: kimi-k2.5
#       strategy: race
#       backends:
#         - zen
#         - go
#
#   # Circuit breaker: automatically suspend backends that return
#   # consecutive 429 (rate limit) responses. Disabled backends are
#   # temporarily removed from routing until the cooldown expires.
#   # circuit_breaker:
#   #   enabled: true         # Enable/disable circuit breaker (default: true).
#   #   threshold: 3          # Consecutive failures before tripping (default: 3).
#   #   cooldown: 900         # Seconds to keep tripped backend suspended (default: 900 = 15min).
