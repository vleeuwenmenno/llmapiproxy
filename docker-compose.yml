services:
  llmapiproxy:
    build: .
    image: llmapiproxy:dev
    ports:
      - "8000:8000"
      - "1455:1455"
    volumes:
      - ./data:/app/data
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
