services:
  llmapiproxy:
    build: .
    image: llmapiproxy:dev
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./stats.db:/app/stats.db
      - ./chat.db:/app/chat.db
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
